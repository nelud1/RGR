<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Отправить сообщение</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2>Отправить сообщение</h2>
        <form id="messageForm">
            <div class="form-group">
                <label>Кому:</label>
                <input type="text" id="receiverName" readonly disabled>
            </div>
            <div class="form-group">
                <label>Тема (до 30 символов):</label>
                <input type="text" id="subject" maxlength="30" required>
            </div>
            <div class="form-group">
                <label>Сообщение (до 500 символов):</label>
                <textarea id="content" maxlength="500" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Отправить</button>
            <button type="button" class="btn btn-secondary" onclick="window.close()">Отмена</button>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    var receiverId = null;

    $(document).ready(function() {
        var urlParams = new URLSearchParams(window.location.search);
        receiverId = urlParams.get('to');
        var receiverName = urlParams.get('name');

        if (!receiverId) {
            $('#message').removeClass('success').addClass('error').text('Не указан получатель').show();
            return;
        }

        $('#receiverName').val(receiverName || 'Пользователь');

        $('#messageForm').submit(function(e) {
            e.preventDefault();

            $.ajax({
                url: '/api/messages/send',
                method: 'POST',
                data: {
                    receiverId: receiverId,
                    subject: $('#subject').val(),
                    content: $('#content').val()
                },
                success: function(data) {
                    if (data.success) {
                        $('#message').removeClass('error').addClass('success').text('Сообщение отправлено').show();
                        setTimeout(function() { window.close(); }, 1500);
                    } else {
                        $('#message').removeClass('success').addClass('error').text(data.error).show();
                    }
                },
                error: function() {
                    $('#message').removeClass('success').addClass('error').text('Ошибка сервера').show();
                }
            });
        });
    });
</script>
</body>
</html>
