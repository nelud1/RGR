<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/messages.js"></script>
    <script src="/js/search.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="search-container">
        <div class="search-tabs">
            <button id="usersTabBtn" class="tab-btn active" data-i18n="search.users">Поиск пользователей</button>
            <button id="newsTabBtn" class="tab-btn" data-i18n="search.news">Поиск новостей</button>
        </div>

        <div id="usersSearch" class="tab-content active">
            <h3 data-i18n="search.users">Поиск пользователей</h3>
            <form id="userSearchForm">
                <div class="search-row">
                    <input type="text" id="searchFirstName" data-i18n-placeholder="search.firstname" placeholder="Имя">
                    <input type="text" id="searchLastName" data-i18n-placeholder="search.lastname" placeholder="Фамилия">
                    <input type="text" id="searchCity" data-i18n-placeholder="search.city" placeholder="Город">
                </div>
                <div class="search-row">
                    <input type="number" id="searchAgeFrom" data-i18n-placeholder="search.age_from" placeholder="Возраст от" min="1" max="120">
                    <input type="number" id="searchAgeTo" data-i18n-placeholder="search.age_to" placeholder="Возраст до" min="1" max="120">
                    <button type="submit" class="btn btn-primary" data-i18n="app.search">Найти</button>
                </div>
            </form>
            <div id="userResults" class="search-results"></div>
        </div>

        <div id="newsSearch" class="tab-content">
            <h3 data-i18n="search.news">Поиск новостей</h3>
            <form id="newsSearchForm">
                <div class="search-row">
                    <input type="text" id="searchKeyword" data-i18n-placeholder="search.keyword" placeholder="Ключевые слова">
                    <button type="submit" class="btn btn-primary" data-i18n="app.search">Найти</button>
                </div>
            </form>
            <div id="newsResults" class="search-results"></div>
        </div>
    </div>
</div>
</body>
</html>
