<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="search-container">
        <div class="search-tabs">
            <button id="usersTabBtn" class="tab-btn active" data-i18n="search.users">Поиск пользователей</button>
            <button id="newsTabBtn" class="tab-btn" data-i18n="search.news">Поиск новостей</button>
        </div>

        <div id="usersSearch" class="tab-content active">
            <h3 data-i18n="search.users">Поиск пользователей</h3>
            <form id="userSearchForm">
                <div class="search-row">
                    <input type="text" id="searchFirstName" data-i18n-placeholder="search.firstname" placeholder="Имя">
                    <input type="text" id="searchLastName" data-i18n-placeholder="search.lastname" placeholder="Фамилия">
                    <input type="text" id="searchCity" data-i18n-placeholder="search.city" placeholder="Город">
                </div>
                <div class="search-row">
                    <input type="number" id="searchAgeFrom" data-i18n-placeholder="search.age_from" placeholder="Возраст от" min="1" max="120">
                    <input type="number" id="searchAgeTo" data-i18n-placeholder="search.age_to" placeholder="Возраст до" min="1" max="120">
                    <button type="submit" class="btn btn-primary" data-i18n="app.search">Найти</button>
                </div>
            </form>
            <div id="userResults" class="search-results"></div>
        </div>

        <div id="newsSearch" class="tab-content">
            <h3 data-i18n="search.news">Поиск новостей</h3>
            <form id="newsSearchForm">
                <div class="search-row">
                    <input type="text" id="searchKeyword" data-i18n-placeholder="search.keyword" placeholder="Ключевые слова">
                    <button type="submit" class="btn btn-primary" data-i18n="app.search">Найти</button>
                </div>
            </form>
            <div id="newsResults" class="search-results"></div>
        </div>
    </div>
</div>

<script>
    let currentUserRole = '';
    let currentUserId = null;

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function openMessageWindow(userId, userName) {
        window.location.href = 'messages.html?with=' + userId;
    }

    async function sendFriendRequest(userId) {
        try {
            const response = await fetch('/api/friends/request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `toUserId=${userId}`
            });

            const data = await response.json();
            alert(data.success ? t('friends.request_sent') : (data.error || t('friends.request_error')));
        } catch (error) {
            alert(t('error.server'));
        }
    }

    async function makeModerator(userId) {
        try {
            const response = await fetch('/api/admin/make-moderator', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `userId=${userId}`
            });

            const data = await response.json();
            if (data.success) {
                alert(t('role.make_moderator') + ' ' + t('app.success'));
                document.getElementById('userSearchForm').dispatchEvent(new Event('submit'));
            } else {
                alert(data.error || t('error.server'));
            }
        } catch (error) {
            alert(t('error.server'));
        }
    }

    async function removeModerator(userId) {
        try {
            const response = await fetch('/api/admin/remove-moderator', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `userId=${userId}`
            });

            const data = await response.json();
            if (data.success) {
                alert(t('role.remove_moderator') + ' ' + t('app.success'));
                document.getElementById('userSearchForm').dispatchEvent(new Event('submit'));
            } else {
                alert(data.error || t('error.server'));
            }
        } catch (error) {
            alert(t('error.server'));
        }
    }

    async function deleteUser(userId) {
        if (confirm(t('role.delete_confirm'))) {
            try {
                const response = await fetch('/api/admin/delete-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `userId=${userId}`
                });

                const data = await response.json();
                if (data.success) {
                    alert(t('role.user_deleted'));
                    document.getElementById('userSearchForm').dispatchEvent(new Event('submit'));
                } else {
                    alert(data.error || t('error.server'));
                }
            } catch (error) {
                alert(t('error.server'));
            }
        }
    }

    function renderUserCard(user) {
        const age = user.age ? `<p>${t('profile.age')}: ${user.age}</p>` : '';

        let adminButtons = '';
        if (currentUserRole === 'ADMIN' && user.id !== currentUserId) {
            if (user.role === 'MODERATOR') {
                adminButtons = `<button onclick="removeModerator(${user.id})" class="btn btn-small">${t('role.remove_moderator')}</button>`;
            } else if (user.role === 'USER') {
                adminButtons = `<button onclick="makeModerator(${user.id})" class="btn btn-small">${t('role.make_moderator')}</button>`;
            }
            adminButtons += `<button onclick="deleteUser(${user.id})" class="btn btn-danger btn-small">${t('role.delete_user')}</button>`;
        }

        let roleText = '';
        if (user.role === 'ADMIN') roleText = t('role.admin');
        else if (user.role === 'MODERATOR') roleText = t('role.moderator');
        else roleText = t('role.user');

        const html = `
            <div class="user-card" id="user-${user.id}">
                <h4>${escapeHtml(user.firstName)} ${escapeHtml(user.lastName)}</h4>
                <p>${t('profile.email')}: ${escapeHtml(user.email)}</p>
                <p>${t('profile.city')}: ${user.city || t('profile.city.not_specified')}</p>
                ${age}
                <p>${t('profile.role')}: ${roleText}</p>
                <button onclick="sendFriendRequest(${user.id})" class="btn btn-small">${t('friends.add')}</button>
                <button onclick="openMessageWindow(${user.id}, '${escapeHtml(user.firstName)} ${escapeHtml(user.lastName)}')" class="btn btn-small">${t('messages.send')}</button>
                ${adminButtons}
            </div>
        `;

        document.getElementById('userResults').insertAdjacentHTML('beforeend', html);
    }

    async function renderNewsItem(news) {
        const html = `
            <div class="news-item">
                <h4>${escapeHtml(news.title)}</h4>
                <p>${escapeHtml(news.content)}</p>
                <small>${t('news.author')}: ${escapeHtml(news.authorName)} | ${formatDate(news.createdAt)}</small>
            </div>
        `;
        document.getElementById('newsResults').insertAdjacentHTML('beforeend', html);
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }

        const authResponse = await fetch('/api/auth/me');
        const authData = await authResponse.json();
        if (!authData.authenticated) {
            window.location.href = 'login.html';
        }
        currentUserRole = authData.role || 'USER';
        currentUserId = authData.userId;

        const usersTabBtn = document.getElementById('usersTabBtn');
        const newsTabBtn = document.getElementById('newsTabBtn');
        const usersSearch = document.getElementById('usersSearch');
        const newsSearch = document.getElementById('newsSearch');

        usersTabBtn.addEventListener('click', () => {
            usersTabBtn.classList.add('active');
            newsTabBtn.classList.remove('active');
            usersSearch.classList.add('active');
            newsSearch.classList.remove('active');
        });

        newsTabBtn.addEventListener('click', () => {
            newsTabBtn.classList.add('active');
            usersTabBtn.classList.remove('active');
            newsSearch.classList.add('active');
            usersSearch.classList.remove('active');
        });

        const userSearchForm = document.getElementById('userSearchForm');
        userSearchForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = document.getElementById('searchFirstName').value;
            const lastName = document.getElementById('searchLastName').value;
            const city = document.getElementById('searchCity').value;
            const ageFrom = document.getElementById('searchAgeFrom').value;
            const ageTo = document.getElementById('searchAgeTo').value;

            let url = `/api/users/search?firstName=${encodeURIComponent(firstName)}&lastName=${encodeURIComponent(lastName)}&city=${encodeURIComponent(city)}`;
            if (ageFrom) url += `&ageFrom=${ageFrom}`;
            if (ageTo) url += `&ageTo=${ageTo}`;

            try {
                const response = await fetch(url);
                const users = await response.json();
                const container = document.getElementById('userResults');
                container.innerHTML = '';

                if (users.length === 0) {
                    container.innerHTML = `<p>${t('search.no_users')}</p>`;
                } else {
                    for (const user of users) {
                        renderUserCard(user);
                    }
                }
            } catch (error) {
                document.getElementById('userResults').innerHTML = `<p>${t('search.error')}</p>`;
            }
        });

        const newsSearchForm = document.getElementById('newsSearchForm');
        newsSearchForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const keyword = document.getElementById('searchKeyword').value;

            try {
                const response = await fetch(`/api/news/search?keyword=${encodeURIComponent(keyword)}`);
                const newsList = await response.json();
                const container = document.getElementById('newsResults');
                container.innerHTML = '';

                if (newsList.length === 0) {
                    container.innerHTML = `<p>${t('search.no_news')}</p>`;
                } else {
                    for (const news of newsList) {
                        await renderNewsItem(news);
                    }
                }
            } catch (error) {
                document.getElementById('newsResults').innerHTML = `<p>${t('search.error')}</p>`;
            }
        });
    });
</script>
</body>
</html>
