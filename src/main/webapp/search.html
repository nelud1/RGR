<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Поиск</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3>Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html">Лента</a></li>
            <li><a href="profile.html">Профиль</a></li>
            <li><a href="friends.html">Друзья</a></li>
            <li><a href="messages.html">Сообщения</a></li>
            <li><a href="search.html">Поиск</a></li>
            <li><a href="#" onclick="logout()">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="search-container">
        <div class="search-tabs">
            <button class="tab-btn active" onclick="switchTab('users')">Поиск пользователей</button>
            <button class="tab-btn" onclick="switchTab('news')">Поиск новостей</button>
        </div>

        <div id="usersSearch" class="tab-content active">
            <h3>Поиск пользователей</h3>
            <form id="userSearchForm">
                <div class="search-row">
                    <input type="text" id="searchFirstName" placeholder="Имя">
                    <input type="text" id="searchLastName" placeholder="Фамилия">
                    <input type="text" id="searchCity" placeholder="Город">
                    <button type="submit" class="btn btn-primary">Найти</button>
                </div>
            </form>
            <div id="userResults" class="search-results"></div>
        </div>

        <div id="newsSearch" class="tab-content">
            <h3>Поиск новостей</h3>
            <form id="newsSearchForm">
                <div class="search-row">
                    <input type="text" id="searchKeyword" placeholder="Ключевые слова">
                    <button type="submit" class="btn btn-primary">Найти</button>
                </div>
            </form>
            <div id="newsResults" class="search-results"></div>
        </div>
    </div>
</div>

<script>
    var currentUserRole = '';
    var currentUserId = null;

    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'GET',
            success: function() {
                window.location.href = 'login.html';
            }
        });
    }

    function switchTab(tab) {
        $('.tab-content').removeClass('active');
        $('.tab-btn').removeClass('active');

        if (tab === 'users') {
            $('#usersSearch').addClass('active');
            $('.tab-btn:first').addClass('active');
        } else {
            $('#newsSearch').addClass('active');
            $('.tab-btn:last').addClass('active');
        }
    }

    function formatDate(dateString) {
        var date = new Date(dateString);
        return date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function openMessageWindow(userId, userName) {
        var url = 'send-message.html?to=' + userId + '&name=' + encodeURIComponent(userName);
        window.open(url, '_blank', 'width=500,height=500,resizable=yes,scrollbars=yes');
    }

    function sendFriendRequest(userId) {
        $.ajax({
            url: '/api/friends/request',
            method: 'POST',
            data: { toUserId: userId },
            success: function(data) {
                if (data.success) {
                    alert('Заявка отправлена');
                } else {
                    alert(data.error || 'Ошибка');
                }
            }
        });
    }

    function makeModerator(userId) {
        $.ajax({
            url: '/api/admin/make-moderator',
            method: 'POST',
            data: { userId: userId },
            success: function(data) {
                if (data.success) {
                    alert('Пользователь назначен модератором');
                    $('#userSearchForm').submit();
                } else {
                    alert(data.error || 'Ошибка');
                }
            }
        });
    }

    function removeModerator(userId) {
        $.ajax({
            url: '/api/admin/remove-moderator',
            method: 'POST',
            data: { userId: userId },
            success: function(data) {
                if (data.success) {
                    alert('Роль модератора снята');
                    $('#userSearchForm').submit();
                } else {
                    alert(data.error || 'Ошибка');
                }
            }
        });
    }

    function deleteUser(userId) {
        if (confirm('Удалить пользователя? Все его новости, комментарии и сообщения будут удалены.')) {
            $.ajax({
                url: '/api/admin/delete-user',
                method: 'POST',
                data: { userId: userId },
                success: function(data) {
                    if (data.success) {
                        alert('Пользователь удален');
                        $('#userSearchForm').submit();
                    } else {
                        alert(data.error || 'Ошибка');
                    }
                }
            });
        }
    }

    function renderUserCard(user) {
        var age = '';
        if (user.birthDate) {
            var birth = new Date(user.birthDate);
            var today = new Date();
            age = today.getFullYear() - birth.getFullYear();
        }

        var adminButtons = '';
        if (currentUserRole === 'ADMIN' && user.id !== currentUserId) {
            if (user.role === 'MODERATOR') {
                adminButtons = '<button onclick="removeModerator(' + user.id + ')" class="btn btn-small">Снять модератора</button>';
            } else if (user.role === 'USER') {
                adminButtons = '<button onclick="makeModerator(' + user.id + ')" class="btn btn-small">Назначить модератором</button>';
            }
            adminButtons += '<button onclick="deleteUser(' + user.id + ')" class="btn btn-danger btn-small">Удалить пользователя</button>';
        }

        var html = '<div class="user-card" id="user-' + user.id + '">' +
            '<h4>' + escapeHtml(user.firstName) + ' ' + escapeHtml(user.lastName) + '</h4>' +
            '<p>Email: ' + escapeHtml(user.email) + '</p>' +
            '<p>Город: ' + (user.city || 'Не указан') + '</p>' +
            (age ? '<p>Возраст: ' + age + '</p>' : '') +
            '<p>Роль: ' + (user.role === 'ADMIN' ? 'Администратор' : (user.role === 'MODERATOR' ? 'Модератор' : 'Пользователь')) + '</p>' +
            '<button onclick="sendFriendRequest(' + user.id + ')" class="btn btn-small">Добавить в друзья</button>' +
            '<button onclick="openMessageWindow(' + user.id + ', \'' + escapeHtml(user.firstName) + ' ' + escapeHtml(user.lastName) + '\')" class="btn btn-small">Написать сообщение</button>' +
            adminButtons +
        '</div>';

        $('#userResults').append(html);
    }

    function renderNewsItem(news) {
        var html = '<div class="news-item">' +
            '<h4>' + escapeHtml(news.title) + '</h4>' +
            '<p>' + escapeHtml(news.content) + '</p>' +
            '<small>Автор: ' + escapeHtml(news.authorName) + ' | ' + formatDate(news.createdAt) + '</small>' +
        '</div>';
        $('#newsResults').append(html);
    }

    $(document).ready(function() {
        $.ajax({
            url: '/api/auth/me',
            method: 'GET',
            success: function(data) {
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                }
                currentUserRole = data.role || 'USER';
                currentUserId = data.userId;
            }
        });

        $('#userSearchForm').submit(function(e) {
            e.preventDefault();

            $.ajax({
                url: '/api/users/search',
                method: 'GET',
                data: {
                    firstName: $('#searchFirstName').val(),
                    lastName: $('#searchLastName').val(),
                    city: $('#searchCity').val()
                },
                success: function(users) {
                    $('#userResults').empty();
                    if (users.length === 0) {
                        $('#userResults').html('<p>Пользователи не найдены</p>');
                    } else {
                        for (var i = 0; i < users.length; i++) {
                            renderUserCard(users[i]);
                        }
                    }
                }
            });
        });

        $('#newsSearchForm').submit(function(e) {
            e.preventDefault();

            $.ajax({
                url: '/api/news/search',
                method: 'GET',
                data: {
                    keyword: $('#searchKeyword').val()
                },
                success: function(newsList) {
                    $('#newsResults').empty();
                    if (newsList.length === 0) {
                        $('#newsResults').html('<p>Новости не найдены</p>');
                    } else {
                        for (var i = 0; i < newsList.length; i++) {
                            renderNewsItem(newsList[i]);
                        }
                    }
                }
            });
        });
    });
</script>
</body>
</html>
