<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2>Регистрация</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Имя:</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Фамилия:</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Пароль:</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Подтверждение пароля:</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
            <a href="login.html" class="link">Уже есть аккаунт? Войдите</a>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#registerForm').submit(function(e) {
            e.preventDefault();

            var password = $('#password').val();
            var confirmPassword = $('#confirmPassword').val();

            if (password !== confirmPassword) {
                $('#message').removeClass('success').addClass('error').text('Пароли не совпадают').show();
                return;
            }

            $.ajax({
                url: '/api/auth/register',
                method: 'POST',
                data: {
                    firstName: $('#firstName').val(),
                    lastName: $('#lastName').val(),
                    email: $('#email').val(),
                    password: password,
                    confirmPassword: confirmPassword
                },
                success: function(data) {
                    if (data.success) {
                        $('#message').removeClass('error').addClass('success').text('Регистрация успешна! На вашу почту отправлено письмо с ссылкой для активации.').show();
                        setTimeout(function() {
                            window.location.href = '/login.html';
                        }, 3000);
                    } else {
                        $('#message').removeClass('success').addClass('error').text(data.error).show();
                    }
                },
                error: function(xhr) {
                    var errorMsg = 'Ошибка сервера';
                    if (xhr.responseJSON && xhr.responseJSON.error) {
                        errorMsg = xhr.responseJSON.error;
                    }
                    $('#message').removeClass('success').addClass('error').text(errorMsg).show();
                }
            });
        });
    });
</script>
</body>
</html>
