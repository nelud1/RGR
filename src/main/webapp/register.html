<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/messages.js"></script>
    <script src="/js/search.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2 data-i18n="auth.register.title">Регистрация</h2>
        <form id="registerForm">
            <div class="form-group">
                <label data-i18n="auth.register.firstname">Имя:</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.lastname">Фамилия:</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.password">Пароль:</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.confirm_password">Подтверждение пароля:</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.register.button">Зарегистрироваться</button>
            <a href="login.html" class="link" data-i18n="auth.register.have_account">Уже есть аккаунт? Войдите</a>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>
</body>
</html>
