<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2 data-i18n="auth.register.title">Регистрация</h2>
        <form id="registerForm">
            <div class="form-group">
                <label data-i18n="auth.register.firstname">Имя:</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.lastname">Фамилия:</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.password">Пароль:</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <div class="form-group">
                <label data-i18n="auth.register.confirm_password">Подтверждение пароля:</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.register.button">Зарегистрироваться</button>
            <a href="login.html" class="link" data-i18n="auth.register.have_account">Уже есть аккаунт? Войдите</a>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = t('auth.register.password_mismatch');
                messageDiv.style.display = 'block';
                return;
            }

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `firstName=${encodeURIComponent(firstName)}&lastName=${encodeURIComponent(lastName)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&confirmPassword=${encodeURIComponent(confirmPassword)}`
                });

                const data = await response.json();

                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = t('auth.register.success');
                    messageDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = t('error.server');
                messageDiv.style.display = 'block';
            }
        });
    });
</script>
</body>
</html>
