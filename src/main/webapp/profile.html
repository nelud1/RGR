<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="profile-container">
        <h2 data-i18n="profile.title">Мой профиль</h2>

        <div class="avatar-section">
            <img id="avatar" src="" alt="Аватар" style="max-width: 150px; max-height: 150px; border-radius: 50%;">
            <form id="avatarForm" enctype="multipart/form-data">
                <input type="file" id="avatarFile" accept="image/jpeg,image/png">
                <button type="submit" class="btn btn-small" data-i18n="profile.avatar">Загрузить аватар</button>
            </form>
            <div id="avatarMessage" class="message"></div>
        </div>

        <form id="profileForm">
            <div class="form-group">
                <label data-i18n="profile.firstname">Имя:</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label data-i18n="profile.lastname">Фамилия:</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label data-i18n="profile.email">Email:</label>
                <input type="email" id="email" disabled>
            </div>
            <div class="form-group">
                <label data-i18n="profile.birthdate">Дата рождения:</label>
                <input type="date" id="birthDate">
            </div>
            <div class="form-group">
                <label data-i18n="profile.gender">Пол:</label>
                <select id="gender">
                    <option value="" data-i18n="profile.gender.not_specified">Не указан</option>
                    <option value="male" data-i18n="profile.gender.male">Мужской</option>
                    <option value="female" data-i18n="profile.gender.female">Женский</option>
                </select>
            </div>
            <div class="form-group">
                <label data-i18n="profile.city">Город:</label>
                <input type="text" id="city" maxlength="100">
            </div>
            <div class="form-group">
                <label data-i18n="profile.about">О себе:</label>
                <textarea id="about" maxlength="500" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="app.save">Сохранить изменения</button>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }

        loadProfile();

        const profileForm = document.getElementById('profileForm');
        if (profileForm) {
            profileForm.addEventListener('submit', (e) => {
                e.preventDefault();
                updateProfile(e);
            });
        }

        const avatarForm = document.getElementById('avatarForm');
        if (avatarForm) {
            avatarForm.addEventListener('submit', (e) => {
                e.preventDefault();
                uploadAvatar(e);
            });
        }
    });
</script>
</body>
</html>
