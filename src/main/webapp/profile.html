 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h3>Социальная сеть</h3>
            <ul class="nav-menu">
                <li><a href="main.html">Лента</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="search.html">Поиск</a></li>
                <li><a href="messages.html">Сообщения</a></li>
                <li><a href="#" onclick="logout()">Выход</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <div class="profile-container">
            <h2>Мой профиль</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label>Имя:</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label>Фамилия:</label>
                    <input type="text" id="lastName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" disabled>
                </div>
                <div class="form-group">
                    <label>Дата рождения:</label>
                    <input type="date" id="birthDate">
                </div>
                <div class="form-group">
                    <label>Пол:</label>
                    <select id="gender">
                        <option value="">Не указан</option>
                        <option value="male">Мужской</option>
                        <option value="female">Женский</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Город:</label>
                    <input type="text" id="city" maxlength="50">
                </div>
                <div class="form-group">
                    <label>О себе:</label>
                    <textarea id="about" maxlength="500" rows="4"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            checkAuth();
            loadProfile();
        });
        
        function loadProfile() {
            $.ajax({
                url: 'api/users/profile',
                method: 'GET',
                success: function(user) {
                    if (user) {
                        $('#firstName').val(user.firstName);
                        $('#lastName').val(user.lastName);
                        $('#email').val(user.email);
                        $('#birthDate').val(user.birthDate);
                        $('#gender').val(user.gender || '');
                        $('#city').val(user.city || '');
                        $('#about').val(user.about || '');
                    }
                }
            });
        }
        
        $('#profileForm').submit(function(e) {
            e.preventDefault();
            
            $.ajax({
                url: 'api/users/profile/update',
                method: 'POST',
                data: {
                    firstName: $('#firstName').val(),
                    lastName: $('#lastName').val(),
                    birthDate: $('#birthDate').val(),
                    gender: $('#gender').val(),
                    city: $('#city').val(),
                    about: $('#about').val()
                },
                success: function(data) {
                    if (data.success) {
                        showMessage('Профиль успешно обновлен', 'success');
                    } else {
                        showMessage(data.error, 'error');
                    }
                }
            });
        });
    </script>
</body>
</html>
