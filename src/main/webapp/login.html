<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/messages.js"></script>
    <script src="/js/search.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2 data-i18n="auth.login.title">Вход в систему</h2>
        <form id="loginForm">
            <div class="form-group">
                <label data-i18n="auth.login.email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.login.password">Пароль:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.login.button">Войти</button>
            <a href="register.html" class="link" data-i18n="auth.login.no_account">Нет аккаунта? Зарегистрируйтесь</a>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>
</body>
</html>
