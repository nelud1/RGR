<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2 data-i18n="auth.login.title">Вход в систему</h2>
        <form id="loginForm">
            <div class="form-group">
                <label data-i18n="auth.login.email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label data-i18n="auth.login.password">Пароль:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.login.button">Войти</button>
            <a href="register.html" class="link" data-i18n="auth.login.no_account">Нет аккаунта? Зарегистрируйтесь</a>
        </form>
        <div id="message" class="message"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/main.html';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.error;
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = t('error.server');
                messageDiv.style.display = 'block';
            }
        });
    });
</script>
</body>
</html>
