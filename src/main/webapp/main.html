<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/messages.js"></script>
    <script src="/js/search.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="main-content">
        <div class="create-news">
            <h3 data-i18n="news.create">Создать новость</h3>
            <form id="newsForm" enctype="multipart/form-data">
                <input type="text" id="newsTitle" data-i18n-placeholder="news.title" placeholder="Заголовок (до 30 символов)" maxlength="30" required>
                <textarea id="newsContent" data-i18n-placeholder="news.content" placeholder="Текст новости (до 500 символов)" maxlength="500" required></textarea>
                <select id="accessLevel">
                    <option value="PUBLIC" data-i18n="news.visibility.public">Для всех</option>
                    <option value="FRIENDS_ONLY" data-i18n="news.visibility.friends">Только для друзей</option>
                </select>
                <input type="file" id="newsImage" accept="image/jpeg,image/png">
                <button type="submit" class="btn btn-primary" data-i18n="news.publish">Опубликовать</button>
            </form>
            <div id="newsMessage" class="message"></div>
        </div>

        <div class="news-feed" id="newsFeed"></div>
    </div>
</div>
</body>
</html>
