 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лента новостей</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h3>Социальная сеть</h3>
            <ul class="nav-menu">
                <li><a href="main.html">Лента</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="search.html">Поиск</a></li>
                <li><a href="messages.html">Сообщения</a></li>
                <li><a href="#" onclick="logout()">Выход</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <div class="main-content">
            <div class="create-news">
                <h3>Создать новость</h3>
                <form id="newsForm">
                    <input type="text" id="newsTitle" placeholder="Заголовок" maxlength="30" required>
                    <textarea id="newsContent" placeholder="Текст новости" maxlength="500" required></textarea>
                    <select id="accessLevel">
                        <option value="PUBLIC">Для всех</option>
                        <option value="FRIENDS_ONLY">Только для друзей</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Опубликовать</button>
                </form>
            </div>
            
            <div class="news-feed" id="newsFeed">
                <!-- Новости будут загружены сюда -->
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            checkAuth();
        });
        
        $('#newsForm').submit(function(e) {
            e.preventDefault();
            
            $.ajax({
                url: 'api/news/create',
                method: 'POST',
                data: {
                    title: $('#newsTitle').val(),
                    content: $('#newsContent').val(),
                    accessLevel: $('#accessLevel').val()
                },
                success: function(data) {
                    if (data.success) {
                        $('#newsTitle').val('');
                        $('#newsContent').val('');
                        loadNewsFeed();
                    }
                }
            });
        });
    </script>
</body>
</html>
