<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лента новостей</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3>Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html">Лента</a></li>
            <li><a href="profile.html">Профиль</a></li>
            <li><a href="friends.html">Друзья</a></li>
            <li><a href="messages.html">Сообщения</a></li>
            <li><a href="search.html">Поиск</a></li>
            <li><a href="#" onclick="logout()">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="main-content">
        <div class="create-news">
            <h3>Создать новость</h3>
            <form id="newsForm" enctype="multipart/form-data">
                <input type="text" id="newsTitle" placeholder="Заголовок (до 30 символов)" maxlength="30" required>
                <textarea id="newsContent" placeholder="Текст новости (до 500 символов)" maxlength="500" required></textarea>
                <select id="accessLevel">
                    <option value="PUBLIC">Для всех</option>
                    <option value="FRIENDS_ONLY">Только для друзей</option>
                </select>
                <input type="file" id="newsImage" accept="image/jpeg,image/png">
                <button type="submit" class="btn btn-primary">Опубликовать</button>
            </form>
            <div id="newsMessage" class="message"></div>
        </div>

        <div class="news-feed" id="newsFeed"></div>
    </div>
</div>

<script>
    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'GET',
            success: function() {
                window.location.href = 'login.html';
            }
        });
    }

    function formatDate(dateString) {
        var date = new Date(dateString);
        return date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    function loadNewsFeed() {
        $.ajax({
            url: '/api/news/feed',
            method: 'GET',
            success: function(newsList) {
                $('#newsFeed').empty();
                if (newsList.length === 0) {
                    $('#newsFeed').html('<p>Нет новостей</p>');
                } else {
                    for (var i = 0; i < newsList.length; i++) {
                        renderNewsItem(newsList[i]);
                    }
                }
            }
        });
    }

    function renderNewsItem(news) {
        var newsHtml = '<div class="news-item" id="news-' + news.id + '">' +
            '<h4>' + escapeHtml(news.title) + '</h4>' +
            '<p>' + escapeHtml(news.content) + '</p>';

        if (news.imagePath && news.imagePath !== 'null') {
            newsHtml += '<img src="' + news.imagePath + '" style="max-width:100%; max-height:300px; margin:10px 0;">';
        }

        newsHtml += '<small>Автор: ' + escapeHtml(news.authorName) + ' | ' + formatDate(news.createdAt) + '</small>' +
            '<div class="news-actions">' +
                '<button onclick="likeNews(' + news.id + ')" class="like-btn">👍 ' + (news.likesCount || 0) + '</button>' +
                '<button onclick="dislikeNews(' + news.id + ')" class="dislike-btn">👎 ' + (news.dislikesCount || 0) + '</button>';

        if (news.canDelete) {
            newsHtml += '<button onclick="deleteNews(' + news.id + ')" class="btn btn-danger btn-small">Удалить</button>';
        }

        newsHtml += '</div>' +
            '<div class="comments-section">' +
                '<div id="comments-' + news.id + '"></div>' +
                '<div class="comment-form">' +
                    '<input type="text" id="comment-input-' + news.id + '" placeholder="Написать комментарий..." maxlength="100">' +
                    '<button onclick="addComment(' + news.id + ')" class="btn btn-primary btn-small">Отправить</button>' +
                '</div>' +
            '</div>' +
        '</div>';

        $('#newsFeed').append(newsHtml);
        loadComments(news.id);
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function loadComments(newsId) {
        $.ajax({
            url: '/api/news/' + newsId + '/comments',
            method: 'GET',
            success: function(comments) {
                var container = $('#comments-' + newsId);
                container.empty();
                for (var i = 0; i < comments.length; i++) {
                    var comment = comments[i];
                    var commentHtml = '<div class="comment">' +
                        '<strong>' + escapeHtml(comment.authorName) + ':</strong> ' + escapeHtml(comment.content) +
                        '<br><small>' + formatDate(comment.createdAt) + '</small>' +
                    '</div>';
                    container.append(commentHtml);
                }
            }
        });
    }

    function addComment(newsId) {
        var content = $('#comment-input-' + newsId).val();
        if (!content) return;

        $.ajax({
            url: '/api/news/' + newsId + '/comment',
            method: 'POST',
            data: { content: content },
            success: function(data) {
                if (data.success) {
                    $('#comment-input-' + newsId).val('');
                    loadComments(newsId);
                }
            }
        });
    }

    function likeNews(newsId) {
        $.ajax({
            url: '/api/news/' + newsId + '/like',
            method: 'POST',
            success: function() {
                loadNewsFeed();
            }
        });
    }

    function dislikeNews(newsId) {
        $.ajax({
            url: '/api/news/' + newsId + '/dislike',
            method: 'POST',
            success: function() {
                loadNewsFeed();
            }
        });
    }

    function deleteNews(newsId) {
        if (confirm('Удалить новость?')) {
            $.ajax({
                url: '/api/news/' + newsId,
                method: 'DELETE',
                success: function() {
                    loadNewsFeed();
                }
            });
        }
    }

    $(document).ready(function() {
        $.ajax({
            url: '/api/auth/me',
            method: 'GET',
            success: function(data) {
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                }
            }
        });

        loadNewsFeed();

        $('#newsForm').submit(function(e) {
            e.preventDefault();

            var formData = new FormData();
            formData.append('title', $('#newsTitle').val());
            formData.append('content', $('#newsContent').val());
            formData.append('accessLevel', $('#accessLevel').val());
            var imageFile = $('#newsImage')[0].files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            $.ajax({
                url: '/api/news/create',
                method: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: function(data) {
                    if (data.success) {
                        $('#newsTitle').val('');
                        $('#newsContent').val('');
                        $('#newsImage').val('');
                        $('#newsMessage').removeClass('error').addClass('success').text('Новость опубликована').show();
                        setTimeout(function() { $('#newsMessage').hide(); }, 2000);
                        loadNewsFeed();
                    } else {
                        $('#newsMessage').removeClass('success').addClass('error').text(data.error).show();
                    }
                },
                error: function() {
                    $('#newsMessage').removeClass('success').addClass('error').text('Ошибка сервера').show();
                }
            });
        });
    });
</script>
</body>
</html>
