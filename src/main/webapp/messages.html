 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h3>Социальная сеть</h3>
            <ul class="nav-menu">
                <li><a href="main.html">Лента</a></li>
                <li><a href="profile.html">Профиль</a></li>
                <li><a href="search.html">Поиск</a></li>
                <li><a href="messages.html">Сообщения</a></li>
                <li><a href="#" onclick="logout()">Выход</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <div class="messages-container">
            <div class="send-message">
                <h3>Отправить сообщение</h3>
                <form id="messageForm">
                    <div class="form-group">
                        <label>Кому (ID пользователя):</label>
                        <input type="number" id="receiverId" required>
                        <span id="receiverName"></span>
                    </div>
                    <div class="form-group">
                        <label>Тема:</label>
                        <input type="text" id="subject" maxlength="30" required>
                    </div>
                    <div class="form-group">
                        <label>Сообщение:</label>
                        <textarea id="content" maxlength="500" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
                <div id="sendMessage" class="message"></div>
            </div>
            
            <div class="inbox">
                <h3>Входящие сообщения</h3>
                <div id="messagesList"></div>
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        $(document).ready(function() {
            checkAuth();
            loadInbox();
            
            // Проверяем параметры URL для автозаполнения получателя
            const urlParams = new URLSearchParams(window.location.search);
            const toId = urlParams.get('to');
            const toName = urlParams.get('name');
            if (toId) {
                $('#receiverId').val(toId);
                if (toName) {
                    $('#receiverName').text('(' + toName + ')');
                }
            }
        });
        
        $('#messageForm').submit(function(e) {
            e.preventDefault();
            
            $.ajax({
                url: 'api/messages/send',
                method: 'POST',
                data: {
                    receiverId: $('#receiverId').val(),
                    subject: $('#subject').val(),
                    content: $('#content').val()
                },
                success: function(data) {
                    if (data.success) {
                        showMessage('Сообщение отправлено', 'success', '#sendMessage');
                        $('#subject').val('');
                        $('#content').val('');
                    } else {
                        showMessage(data.error, 'error', '#sendMessage');
                    }
                }
            });
        });
        
        function loadInbox() {
            $.ajax({
                url: 'api/messages/inbox',
                method: 'GET',
                success: function(messages) {
                    $('#messagesList').empty();
                    if (messages && messages.length > 0) {
                        messages.forEach(function(msg) {
                            var messageHtml = `
                                <div class="message-item ${msg.read ? '' : 'unread'}">
                                    <div class="message-header">
                                        <strong>От: ${msg.senderName}</strong>
                                        <span>${formatDate(msg.createdAt)}</span>
                                    </div>
                                    <div class="message-subject">Тема: ${msg.subject}</div>
                                    <div class="message-content">${msg.content}</div>
                                </div>
                            `;
                            $('#messagesList').append(messageHtml);
                        });
                    } else {
                        $('#messagesList').html('<p>Нет сообщений</p>');
                    }
                }
            });
        }
    </script>
</body>
</html>
