<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="messages-container" id="messagesContainer">
        <div class="dialogs-list">
            <div class="dialogs-header">
                <h3 data-i18n="messages.dialogs">Диалоги</h3>
            </div>
            <div id="dialogsList"></div>
        </div>

        <div class="dialog-area" id="dialogArea" style="display:none;">
            <div class="dialog-header" id="dialogHeader"></div>
            <div class="messages-list" id="messagesList"></div>
            <div class="message-form">
                <textarea id="messageContent" data-i18n-placeholder="messages.type_message" placeholder="Введите сообщение..." maxlength="500" rows="3"></textarea>
                <button id="sendMessageBtn" class="btn btn-primary" data-i18n="messages.send">Отправить</button>
            </div>
        </div>

        <div class="empty-dialog" id="emptyDialog">
            <p data-i18n="messages.empty">Выберите диалог или начните новый через поиск или друзей</p>
        </div>
    </div>
</div>

<script>
    let currentDialogUserId = null;
    let currentUserName = null;
    let messageCheckInterval = null;

    function formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        if (date >= today) {
            return date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
        } else if (date >= yesterday) {
            return 'Вчера';
        } else {
            return date.toLocaleDateString('ru-RU', {day: '2-digit', month:'2-digit', year:'2-digit'});
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function loadDialogs() {
        try {
            const response = await fetch('/api/messages/dialogs');
            const dialogs = await response.json();
            const container = document.getElementById('dialogsList');
            container.innerHTML = '';

            if (dialogs.length === 0) {
                container.innerHTML = `<p class="no-dialogs">${t('messages.no_dialogs')}</p>`;
            } else {
                for (const dialog of dialogs) {
                    const unreadBadge = dialog.unreadCount > 0 ? `<span class="unread-badge">${dialog.unreadCount}</span>` : '';
                    const activeClass = (currentDialogUserId === dialog.userId) ? 'active' : '';
                    const html = `
                        <div class="dialog-item ${activeClass}" data-user-id="${dialog.userId}" data-user-name="${escapeHtml(dialog.userName)}">
                            <div class="dialog-avatar">
                                ${dialog.avatarPath ? `<img src="${dialog.avatarPath}">` : `<div class="default-avatar">${dialog.userName.charAt(0).toUpperCase()}</div>`}
                            </div>
                            <div class="dialog-info">
                                <div class="dialog-name">${escapeHtml(dialog.userName)}</div>
                                <div class="dialog-last-message">${escapeHtml(dialog.lastMessage)}</div>
                            </div>
                            <div class="dialog-meta">
                                <div class="dialog-date">${formatDate(dialog.lastMessageDate)}</div>
                                ${unreadBadge}
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                }

                document.querySelectorAll('.dialog-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const userId = parseInt(item.dataset.userId);
                        const userName = item.dataset.userName;
                        openDialog(userId, userName);
                    });
                });
            }
        } catch (error) {
            console.error('Error loading dialogs:', error);
            document.getElementById('dialogsList').innerHTML = `<p class="no-dialogs">${t('messages.load_error')}</p>`;
        }
    }

    function openDialog(userId, userName) {
        currentDialogUserId = userId;
        currentUserName = userName;

        document.getElementById('dialogHeader').innerHTML = `<h3>${escapeHtml(userName)}</h3>`;
        document.getElementById('dialogArea').style.display = 'flex';
        document.getElementById('emptyDialog').style.display = 'none';

        document.querySelectorAll('.dialog-item').forEach(item => {
            item.classList.remove('active');
            if (parseInt(item.dataset.userId) === userId) {
                item.classList.add('active');
            }
        });

        loadMessages();

        if (messageCheckInterval) {
            clearInterval(messageCheckInterval);
        }
        messageCheckInterval = setInterval(loadMessages, 5000);
    }

    async function loadMessages() {
        if (!currentDialogUserId) return;

        try {
            const response = await fetch(`/api/messages/dialog/${currentDialogUserId}`);
            const messages = await response.json();
            const container = document.getElementById('messagesList');
            container.innerHTML = '';

            if (!messages || messages.length === 0) {
                container.innerHTML = `<p class="no-messages">${t('messages.no_messages')}</p>`;
            } else {
                for (const msg of messages) {
                    const messageClass = msg.isMine ? 'message mine' : 'message theirs';
                    const html = `
                        <div class="${messageClass}">
                            <div class="message-text">${escapeHtml(msg.body)}</div>
                            <div class="message-time">${formatDate(msg.createdAt)}</div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                }
                container.scrollTop = container.scrollHeight;
            }
            loadDialogs();
        } catch (error) {
            console.error('Error loading messages:', error);
            document.getElementById('messagesList').innerHTML = `<p class="no-messages">${t('messages.load_error')}</p>`;
        }
    }

    async function sendMessage() {
        const content = document.getElementById('messageContent').value;
        if (!content || !content.trim()) {
            alert(t('messages.type_message'));
            return;
        }

        try {
            const response = await fetch('/api/messages/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `receiverId=${currentDialogUserId}&subject=&content=${encodeURIComponent(content)}`
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('messageContent').value = '';
                loadMessages();
            } else {
                alert(data.error || t('messages.send_error'));
            }
        } catch (error) {
            alert(t('error.server'));
        }
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }

        const sendBtn = document.getElementById('sendMessageBtn');
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }

        const response = await fetch('/api/auth/me');
        const data = await response.json();
        if (!data.authenticated) {
            window.location.href = 'login.html';
        }

        loadDialogs();

        const urlParams = new URLSearchParams(window.location.search);
        const withUserId = urlParams.get('with');
        if (withUserId) {
            try {
                const userResponse = await fetch(`/api/users/${withUserId}`);
                const user = await userResponse.json();
                openDialog(withUserId, user.firstName + ' ' + user.lastName);
            } catch (error) {
                console.log('Пользователь не найден');
            }
        }
    });

    window.addEventListener('beforeunload', () => {
        if (messageCheckInterval) {
            clearInterval(messageCheckInterval);
        }
    });
</script>
</body>
</html>
