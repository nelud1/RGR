<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/profile.js"></script>
    <script src="/js/friends.js"></script>
    <script src="/js/messages.js"></script>
    <script src="/js/search.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="messages-container" id="messagesContainer">
        <div class="dialogs-list">
            <div class="dialogs-header">
                <h3 data-i18n="messages.dialogs">Диалоги</h3>
            </div>
            <div id="dialogsList"></div>
        </div>

        <div class="dialog-area" id="dialogArea" style="display:none;">
            <div class="dialog-header" id="dialogHeader"></div>
            <div class="messages-list" id="messagesList"></div>
            <div class="message-form">
                <textarea id="messageContent" data-i18n-placeholder="messages.type_message" placeholder="Введите сообщение..." maxlength="500" rows="3"></textarea>
                <button id="sendMessageBtn" class="btn btn-primary" data-i18n="messages.send">Отправить</button>
            </div>
        </div>

        <div class="empty-dialog" id="emptyDialog">
            <p data-i18n="messages.empty">Выберите диалог или начните новый через поиск или друзей</p>
        </div>
    </div>
</div>
</body>
</html>
