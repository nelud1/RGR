<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title data-i18n="app.title">Социальная сеть</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js"></script>
    <script src="/js/i18n.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3 data-i18n="app.title">Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html" data-i18n="nav.feed">Лента</a></li>
            <li><a href="profile.html" data-i18n="nav.profile">Профиль</a></li>
            <li><a href="friends.html" data-i18n="nav.friends">Друзья</a></li>
            <li><a href="messages.html" data-i18n="nav.messages">Сообщения</a></li>
            <li><a href="search.html" data-i18n="nav.search">Поиск</a></li>
            <li><a href="#" id="logoutBtn" data-i18n="app.logout">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="friends-container">
        <div class="friend-requests">
            <h3 data-i18n="friends.requests">Заявки мне в друзья</h3>
            <div id="requestsList"></div>
        </div>

        <div class="friends-list">
            <h3 data-i18n="friends.list">Мои друзья</h3>
            <div id="friendsList"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });
        }

        loadFriendRequests();
        loadFriends();
    });
</script>
</body>
</html>
