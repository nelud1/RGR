<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3>Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html">Лента</a></li>
            <li><a href="profile.html">Профиль</a></li>
            <li><a href="friends.html">Друзья</a></li>
            <li><a href="messages.html">Сообщения</a></li>
            <li><a href="search.html">Поиск</a></li>
            <li><a href="#" onclick="logout()">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="inbox-container">
        <h3>Входящие сообщения</h3>
        <div id="messagesList"></div>
    </div>
</div>

<script>
    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'GET',
            success: function() {
                window.location.href = 'login.html';
            }
        });
    }

    function formatDate(dateString) {
        var date = new Date(dateString);
        return date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function loadInbox() {
        $.ajax({
            url: '/api/messages/inbox',
            method: 'GET',
            success: function(messages) {
                $('#messagesList').empty();
                if (messages.length === 0) {
                    $('#messagesList').html('<p>Нет сообщений</p>');
                } else {
                    for (var i = 0; i < messages.length; i++) {
                        var msg = messages[i];
                        var readClass = msg.isRead ? '' : 'unread';
                        var html = '<div class="message-item ' + readClass + '" onclick="viewMessage(' + msg.id + ')">' +
                            '<div class="message-header">' +
                                '<strong>' + escapeHtml(msg.senderName) + '</strong>' +
                                '<span>' + formatDate(msg.createdAt) + '</span>' +
                            '</div>' +
                            '<div class="message-subject">Тема: ' + escapeHtml(msg.subject) + '</div>' +
                            '<div class="message-content">' + escapeHtml(msg.body.substring(0, 100)) + (msg.body.length > 100 ? '...' : '') + '</div>' +
                        '</div>';
                        $('#messagesList').append(html);
                    }
                }
            }
        });
    }

    function viewMessage(messageId) {
        window.location.href = 'message-view.html?id=' + messageId;
    }

    $(document).ready(function() {
        $.ajax({
            url: '/api/auth/me',
            method: 'GET',
            success: function(data) {
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                }
            }
        });

        loadInbox();
    });
</script>
</body>
</html>
