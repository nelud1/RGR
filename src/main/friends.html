<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Друзья</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <h3>Социальная сеть</h3>
        <ul class="nav-menu">
            <li><a href="main.html">Лента</a></li>
            <li><a href="profile.html">Профиль</a></li>
            <li><a href="friends.html">Друзья</a></li>
            <li><a href="messages.html">Сообщения</a></li>
            <li><a href="search.html">Поиск</a></li>
            <li><a href="#" onclick="logout()">Выход</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="friends-container">
        <div class="friend-requests">
            <h3>Заявки мне в друзья</h3>
            <div id="requestsList"></div>
        </div>

        <div class="friends-list">
            <h3>Мои друзья</h3>
            <div id="friendsList"></div>
        </div>
    </div>
</div>

<script>
    function logout() {
        $.ajax({
            url: '/api/auth/logout',
            method: 'GET',
            success: function() {
                window.location.href = 'login.html';
            }
        });
    }

    function loadData() {
        loadRequests();
        loadFriends();
    }

    function loadRequests() {
        $.ajax({
            url: '/api/friends/requests',
            method: 'GET',
            success: function(requests) {
                $('#requestsList').empty();
                if (requests.length === 0) {
                    $('#requestsList').html('<p>Нет входящих заявок</p>');
                } else {
                    for (var i = 0; i < requests.length; i++) {
                        var req = requests[i];
                        var fromName = req.fromName || ('Пользователь ' + req.fromUserId);
                        var html = '<div class="request-item" id="request-' + req.fromUserId + '">' +
                            '<span>' + escapeHtml(fromName) + '</span>' +
                            '<button onclick="acceptRequest(' + req.fromUserId + ')" class="btn btn-small btn-primary">Принять</button>' +
                            '</div>';
                        $('#requestsList').append(html);
                    }
                }
            },
            error: function(xhr) {
                console.error('Error loading requests:', xhr);
                $('#requestsList').html('<p>Ошибка загрузки</p>');
            }
        });
    }

    function loadFriends() {
        $.ajax({
            url: '/api/friends/list',
            method: 'GET',
            success: function(friends) {
                $('#friendsList').empty();
                if (friends.length === 0) {
                    $('#friendsList').html('<p>Нет друзей</p>');
                } else {
                    for (var i = 0; i < friends.length; i++) {
                        var friend = friends[i];
                        var html = '<div class="friend-item">' +
                            '<span>' + escapeHtml(friend.name) + '</span>' +
                            '<button onclick="openMessageWindow(' + friend.id + ', \'' + escapeHtml(friend.name) + '\')" class="btn btn-small">Сообщение</button>' +
                            '</div>';
                        $('#friendsList').append(html);
                    }
                }
            },
            error: function(xhr) {
                console.error('Error loading friends:', xhr);
            }
        });
    }

    function acceptRequest(fromUserId) {
        if (confirm('Принять заявку в друзья?')) {
            $.ajax({
                url: '/api/friends/accept',
                method: 'POST',
                data: { fromUserId: fromUserId },
                success: function(data) {
                    if (data.success) {
                        $('#request-' + fromUserId).remove();
                        loadFriends();
                        alert('Заявка принята');
                    } else {
                        alert(data.error || 'Ошибка при принятии');
                    }
                },
                error: function(xhr) {
                    console.error('Error accepting request:', xhr);
                    alert('Ошибка сервера: ' + (xhr.responseText || 'Неизвестная ошибка'));
                }
            });
        }
    }

    function openMessageWindow(userId, userName) {
        var url = 'send-message.html?to=' + userId + '&name=' + encodeURIComponent(userName);
        window.open(url, '_blank', 'width=500,height=500,resizable=yes,scrollbars=yes');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    $(document).ready(function() {
        $.ajax({
            url: '/api/auth/me',
            method: 'GET',
            success: function(data) {
                if (!data.authenticated) {
                    window.location.href = 'login.html';
                }
            }
        });

        loadData();
    });
</script>
</body>
</html>
